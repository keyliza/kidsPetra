services:
  sqlserver:
    image: mcr.microsoft.com/mssql/server:2022-latest
    environment:
      ACCEPT_EULA: "Y"
      MSSQL_SA_PASSWORD: ${SA_PASSWORD}
      MSSQL_PID: ${MSSQL_PID:-Developer}
    volumes:
      - sqldata:/var/opt/mssql
    healthcheck:
      test: ["CMD-SHELL", "/opt/mssql-tools18/bin/sqlcmd -S localhost -U sa -P \"$${MSSQL_SA_PASSWORD}\" -C -No -Q 'SELECT 1' || exit 1"]
      interval: 10s
      timeout: 5s
      retries: 12
      start_period: 30s
    restart: unless-stopped

  api:
    build:
      context: ./backend
    environment:
      ASPNETCORE_ENVIRONMENT: Production
      ConnectionStrings__Default: "Server=sqlserver,1433;Database=${DB_NAME:-PetraKids};User Id=sa;Password=${SA_PASSWORD};TrustServerCertificate=True;Encrypt=False"
      Jwt__Issuer: ${JWT_ISSUER:-petra-kids}
      Jwt__Audience: ${JWT_AUDIENCE:-petra-kids}
      Jwt__Secret: ${JWT_SECRET}
      Jwt__AccessTokenMinutes: ${JWT_ACCESS_MINUTES:-30}
      Jwt__RefreshTokenDays: ${JWT_REFRESH_DAYS:-14}
      ADMIN_EMAIL: ${ADMIN_EMAIL}
      ADMIN_PASSWORD: ${ADMIN_PASSWORD}
      CORS_ORIGINS: ${CORS_ORIGINS:-http://localhost}
    depends_on:
      sqlserver:
        condition: service_healthy
    expose:
      - "8080"
    restart: unless-stopped

  frontend:
    build:
      context: ./frontend
    depends_on:
      - api
    ports:
      - "${FRONTEND_PORT:-8080}:80"
    restart: unless-stopped

volumes:
  sqldata:
