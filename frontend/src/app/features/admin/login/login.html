<div class="flex min-h-screen items-center justify-center blob-bg px-4 py-10">
  <div class="w-full max-w-sm">
    <a routerLink="/" class="mb-6 flex items-center justify-center gap-2 text-slate-500 transition hover:text-brand-600">
      <app-icon name="arrow-left" [size]="18" /> <span class="text-sm font-bold">Volver al catálogo</span>
    </a>

    <div class="rounded-[1.75rem] bg-white p-8 shadow-lg ring-1 ring-black/5">
      <div class="mb-6 text-center">
        <span class="mx-auto flex size-14 items-center justify-center rounded-2xl bg-brand-500 text-white shadow-sm">
          <app-icon name="sparkles" [size]="28" />
        </span>
        <h1 class="mt-4 font-display text-2xl font-extrabold text-ink">Panel de administración</h1>
        <p class="mt-1 text-sm text-slate-500">Petra Kids</p>
      </div>

      <form (ngSubmit)="submit()" class="space-y-4">
        <div>
          <label for="email" class="mb-1 block text-sm font-bold text-slate-600">Correo</label>
          <input id="email" name="email" type="email" required autocomplete="username"
                 [ngModel]="email()" (ngModelChange)="email.set($event)"
                 class="w-full rounded-xl border border-slate-200 px-4 py-2.5 outline-none transition focus:border-brand-400 focus:ring-2 focus:ring-brand-100"
                 placeholder="tucorreo@petramatagalpa.com" />
        </div>
        <div>
          <label for="password" class="mb-1 block text-sm font-bold text-slate-600">Contraseña</label>
          <input id="password" name="password" type="password" required autocomplete="current-password"
                 [ngModel]="password()" (ngModelChange)="password.set($event)"
                 class="w-full rounded-xl border border-slate-200 px-4 py-2.5 outline-none transition focus:border-brand-400 focus:ring-2 focus:ring-brand-100"
                 placeholder="••••••••" />
        </div>

        @if (error()) {
          <p class="rounded-xl bg-red-50 px-3 py-2 text-sm font-semibold text-red-600" role="alert">{{ error() }}</p>
        }

        <button type="submit" [disabled]="loading()"
                class="w-full rounded-xl bg-brand-500 px-4 py-2.5 font-extrabold text-white shadow-sm transition hover:bg-brand-600 disabled:opacity-60">
          {{ loading() ? 'Ingresando…' : 'Iniciar sesión' }}
        </button>
      </form>
    </div>
  </div>
</div>
