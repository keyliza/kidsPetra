<div class="min-h-screen bg-slate-50">
  <!-- Barra superior -->
  <header class="sticky top-0 z-30 border-b border-slate-200 bg-white">
    <div class="mx-auto flex max-w-6xl items-center gap-3 px-4 py-3 sm:px-6">
      <span class="flex size-9 items-center justify-center rounded-xl bg-brand-500 text-white">
        <app-icon name="sparkles" [size]="20" />
      </span>
      <p class="flex-1 font-display text-lg font-extrabold text-ink">Petra Kids <span class="font-semibold text-slate-400">· Panel</span></p>
      <span class="hidden text-sm text-slate-500 sm:inline">{{ user()?.email }}</span>
      <span class="rounded-full bg-slate-100 px-2.5 py-0.5 text-xs font-bold text-slate-600">{{ user()?.role }}</span>
      <button type="button" (click)="logout()"
              class="inline-flex items-center gap-1.5 rounded-full bg-white px-3 py-1.5 text-sm font-bold text-slate-600 ring-1 ring-slate-200 transition hover:bg-slate-50">
        <app-icon name="log-out" [size]="18" /> <span class="hidden sm:inline">Salir</span>
      </button>
    </div>
  </header>

  <div class="mx-auto max-w-6xl gap-6 px-4 py-6 sm:px-6 lg:flex">
    <!-- Navegación -->
    <nav class="mb-4 flex gap-2 overflow-x-auto lg:mb-0 lg:w-52 lg:shrink-0 lg:flex-col lg:overflow-visible">
      <a routerLink="lecciones" routerLinkActive="bg-brand-500 text-white ring-brand-500"
         [routerLinkActiveOptions]="{ exact: false }"
         class="inline-flex shrink-0 items-center gap-2 rounded-xl bg-white px-4 py-2.5 text-sm font-bold text-slate-600 ring-1 ring-slate-200 transition hover:bg-slate-50">
        <app-icon name="book-open" [size]="18" /> Lecciones
      </a>
      @if (isAdmin()) {
        <a routerLink="secciones" routerLinkActive="bg-brand-500 text-white ring-brand-500"
           class="inline-flex shrink-0 items-center gap-2 rounded-xl bg-white px-4 py-2.5 text-sm font-bold text-slate-600 ring-1 ring-slate-200 transition hover:bg-slate-50">
          <app-icon name="grid" [size]="18" /> Secciones
        </a>
      }
      <a routerLink="importar" routerLinkActive="bg-brand-500 text-white ring-brand-500"
         class="inline-flex shrink-0 items-center gap-2 rounded-xl bg-white px-4 py-2.5 text-sm font-bold text-slate-600 ring-1 ring-slate-200 transition hover:bg-slate-50">
        <app-icon name="upload" [size]="18" /> Importar
      </a>
      <a routerLink="estadisticas" routerLinkActive="bg-brand-500 text-white ring-brand-500"
         class="inline-flex shrink-0 items-center gap-2 rounded-xl bg-white px-4 py-2.5 text-sm font-bold text-slate-600 ring-1 ring-slate-200 transition hover:bg-slate-50">
        <app-icon name="stats" [size]="18" /> Estadísticas
      </a>
    </nav>

    <main class="min-w-0 flex-1">
      <router-outlet />
    </main>
  </div>
</div>
